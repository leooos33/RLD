services:
  migrate_clickhouse:
    image: ${RLD_INDEXER_IMAGE:-rld_indexer_node:latest}
    container_name: rld_clickhouse_migrate
    env_file:
      - .env
    environment:
      - CLICKHOUSE_HOST=rld_clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_MIGRATION_USER:-${CLICKHOUSE_USER:-default}}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_MIGRATION_PASSWORD:-${CLICKHOUSE_PASSWORD:-}}
      - CLICKHOUSE_MANAGE_USERS=${CLICKHOUSE_MANAGE_USERS:-false}
      - CLICKHOUSE_API_USER=${CLICKHOUSE_API_USER:-api_readonly}
      - CLICKHOUSE_API_PASSWORD=${CLICKHOUSE_API_PASSWORD:-}
      - CLICKHOUSE_WORKER_USER=${CLICKHOUSE_WORKER_USER:-worker}
      - CLICKHOUSE_WORKER_PASSWORD=${CLICKHOUSE_WORKER_PASSWORD:-}
      - CLICKHOUSE_MIGRATION_USER=${CLICKHOUSE_MIGRATION_USER:-migration_admin}
      - CLICKHOUSE_MIGRATION_PASSWORD=${CLICKHOUSE_MIGRATION_PASSWORD:-}
      - CLICKHOUSE_ASYNC_INSERT=${CLICKHOUSE_ASYNC_INSERT:-true}
      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-true}
    command: ["python", "/app/scripts/rld_indexer.py", "migrate", "--backfill", "--rebuild-views"]
    restart: "no"

  graphql_api:
    image: ${RLD_INDEXER_IMAGE:-rld_indexer_node:latest}
    container_name: rld_graphql_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      migrate_clickhouse:
        condition: service_completed_successfully
    environment:
      - CLICKHOUSE_HOST=rld_clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_API_USER:-${CLICKHOUSE_USER:-default}}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_API_PASSWORD:-${CLICKHOUSE_PASSWORD:-}}
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - ENVIO_CORS_ORIGINS=${ENVIO_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,https://rld.fi,https://www.rld.fi}
      - INDEXER_READY_PROTOCOLS=${INDEXER_READY_PROTOCOLS:-AAVE_MARKET,CHAINLINK_PRICES,SOFR_RATES}
      - INDEXER_MAX_READY_LAG_BLOCKS=${INDEXER_MAX_READY_LAG_BLOCKS:-250000}
      - INDEXER_MAX_READY_SOFR_BUSINESS_DAYS=${INDEXER_MAX_READY_SOFR_BUSINESS_DAYS:-3}
      - CLICKHOUSE_INSERT_BATCH_SIZE=${CLICKHOUSE_INSERT_BATCH_SIZE:-20000}
      - INDEXER_VERSION=${INDEXER_VERSION:-dev}
    command:
      [
        "uvicorn",
        "indexer.api.graphql:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--workers",
        "2",
        "--http",
        "h11",
        "--timeout-keep-alive",
        "5",
        "--limit-max-requests",
        "20000",
        "--limit-concurrency",
        "512"
      ]
    ports:
      - "127.0.0.1:5000:5000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/livez', timeout=2)"
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  aave_worker:
    image: ${RLD_INDEXER_IMAGE:-rld_indexer_node:latest}
    container_name: rld_aave_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      migrate_clickhouse:
        condition: service_completed_successfully
    environment:
      - CLICKHOUSE_HOST=rld_clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_WORKER_USER:-${CLICKHOUSE_USER:-default}}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_WORKER_PASSWORD:-${CLICKHOUSE_PASSWORD:-}}
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - CLICKHOUSE_INSERT_BATCH_SIZE=${CLICKHOUSE_INSERT_BATCH_SIZE:-20000}
      - CLICKHOUSE_ASYNC_INSERT=${CLICKHOUSE_ASYNC_INSERT:-true}
      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-true}
      - INDEXER_VERSION=${INDEXER_VERSION:-dev}
    command: ["python", "/app/scripts/rld_indexer.py", "worker", "--source", "AAVE_MARKET"]

  chainlink_worker:
    image: ${RLD_INDEXER_IMAGE:-rld_indexer_node:latest}
    container_name: rld_chainlink_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      migrate_clickhouse:
        condition: service_completed_successfully
    environment:
      - CLICKHOUSE_HOST=rld_clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_WORKER_USER:-${CLICKHOUSE_USER:-default}}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_WORKER_PASSWORD:-${CLICKHOUSE_PASSWORD:-}}
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - CLICKHOUSE_INSERT_BATCH_SIZE=${CLICKHOUSE_INSERT_BATCH_SIZE:-20000}
      - CLICKHOUSE_ASYNC_INSERT=${CLICKHOUSE_ASYNC_INSERT:-true}
      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-true}
      - INDEXER_VERSION=${INDEXER_VERSION:-dev}
    command: ["python", "/app/scripts/rld_indexer.py", "worker", "--source", "CHAINLINK_PRICES"]

  sofr_worker:
    image: ${RLD_INDEXER_IMAGE:-rld_indexer_node:latest}
    container_name: rld_sofr_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      migrate_clickhouse:
        condition: service_completed_successfully
    environment:
      - CLICKHOUSE_HOST=rld_clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_WORKER_USER:-${CLICKHOUSE_USER:-default}}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_WORKER_PASSWORD:-${CLICKHOUSE_PASSWORD:-}}
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - CLICKHOUSE_INSERT_BATCH_SIZE=${CLICKHOUSE_INSERT_BATCH_SIZE:-20000}
      - CLICKHOUSE_ASYNC_INSERT=${CLICKHOUSE_ASYNC_INSERT:-true}
      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-true}
      - INDEXER_VERSION=${INDEXER_VERSION:-dev}
    command: ["python", "/app/scripts/rld_indexer.py", "worker", "--source", "SOFR_RATES"]

networks:
  default:
    name: rld_shared
    external: true
