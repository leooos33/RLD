version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: rld-indexer-db
    environment:
      POSTGRES_USER: rld
      POSTGRES_PASSWORD: rld_dev_password
      POSTGRES_DB: rld_indexer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rld -d rld_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RLD Indexer Service
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rld-indexer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rld
      DB_PASSWORD: rld_dev_password
      DB_NAME: rld_indexer
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8545}
      CHAIN_ID: ${CHAIN_ID:-11155111}
      START_BLOCK: ${START_BLOCK:-0}
      READ_ONLY_MODE: "true"
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src:ro
    restart: unless-stopped

  # API Service (optional separate deployment)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rld-indexer-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: rld
      DB_PASSWORD: rld_dev_password
      DB_NAME: rld_indexer
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  postgres_data:
