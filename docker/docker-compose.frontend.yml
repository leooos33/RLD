# ═══════════════════════════════════════════════════════════════
# RLD Frontend (Nginx + Vite SPA)
# ═══════════════════════════════════════════════════════════════
# Independently deployable. Proxies to indexer and rates-indexer
# via Docker DNS on the shared rld_shared network.
#
#  Usage:
#    docker compose -f docker/docker-compose.frontend.yml up -d
#
#  Deploy new build:
#    cd frontend && VITE_API_BASE_URL=/api npx vite build
#    docker compose -f docker/docker-compose.frontend.yml up -d --force-recreate
#
#  Access:
#    http://localhost:3000 (direct)
#    https://rld.fi (via Cloudflare → host nginx → :3000)
# ═══════════════════════════════════════════════════════════════

services:
  frontend:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - /home/ubuntu/RLD/frontend/dist:/usr/share/nginx/html:ro
      - /home/ubuntu/RLD/frontend/public/fonts.css:/usr/share/nginx/html/fonts.css:ro
      - /home/ubuntu/RLD/frontend/public/fonts:/usr/share/nginx/html/fonts:ro
      - /home/ubuntu/RLD/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  default:
    name: rld_shared
    external: true
