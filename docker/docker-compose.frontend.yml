# ═══════════════════════════════════════════════════════════════
# RLD Frontend (containerized)
# ═══════════════════════════════════════════════════════════════
# Builds and serves the Vite React frontend via Nginx.
#
#  Usage:
#    docker compose -f docker/docker-compose.frontend.yml up -d --build
#
#  Access:
#    http://localhost:3000
# ═══════════════════════════════════════════════════════════════

services:
  frontend:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      # Serve the pre-built dist from the host (updated by CI via SCP)
      # No image rebuild needed on deploy — just recreate the container
      - /home/ubuntu/RLD/frontend/dist:/usr/share/nginx/html:ro
      # Overlay fonts.css and fonts/ directly from git (always current after git reset)
      # This bypasses any SCP/permission issues with dist/fonts.css
      - /home/ubuntu/RLD/frontend/public/fonts.css:/usr/share/nginx/html/fonts.css:ro
      - /home/ubuntu/RLD/frontend/public/fonts:/usr/share/nginx/html/fonts:ro
      - /home/ubuntu/RLD/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
