# RLD Infrastructure Dashboard — Internal Only
# Serves dashboard on port 8090, accessible via http://<IP>:8090
# API proxy to simulation indexer for finance page

server {
    listen 8090;
    server_name _;

    root /home/ubuntu/RLD/docker/dashboard;
    index index.html;

    # No security headers needed — internal tool
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # CORS for status.json
    location = /status.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # Proxy GraphQL requests to sim indexer
    location /graphql {
        proxy_pass http://127.0.0.1:8080/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    access_log off;
}
