# RLD Infrastructure Dashboard — Internal Only
# Serves dashboard on port 8090, accessible via http://<IP>:8090
# API proxy to simulation indexer for finance page

server {
    listen 8090;
    server_name _;

    root /home/ubuntu/RLD/docker/dashboard;
    index index.html;

    # No security headers needed — internal tool
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # CORS for status.json
    location = /status.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    # 1s real-time status API (served by live_status_server.py on :8091)
    location = /live-status {
        proxy_pass http://127.0.0.1:8091/live-status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    location = /live-status/stream {
        proxy_pass http://127.0.0.1:8091/live-status/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Accel-Buffering "no";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    # Proxy GraphQL requests to sim indexer
    location /graphql {
        proxy_pass http://127.0.0.1:8080/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    access_log off;
}
