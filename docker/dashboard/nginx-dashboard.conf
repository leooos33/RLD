# RLD Infrastructure Dashboard — Authenticated Internal Surface
# Served on loopback only; public access should go through the main edge proxy.
# API proxy to simulation indexer for finance page

server {
    listen 127.0.0.1:8090;
    server_name _;

    root /home/ubuntu/RLD/docker/dashboard;
    index index.html;

    auth_basic "RLD Dashboard";
    auth_basic_user_file /etc/nginx/rld-dashboard.htpasswd;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # CORS for status.json
    location = /status.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    # 1s real-time status API (served by live_status_server.py on :8091)
    location = /live-status {
        proxy_pass http://127.0.0.1:8091/live-status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    location = /live-status/stream {
        proxy_pass http://127.0.0.1:8091/live-status/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Accel-Buffering "no";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    location ~ ^/api/(market-info|status|events|volume|latest|price-history)/?$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    location /api/ {
        return 404;
    }

    # Proxy GraphQL requests to sim indexer
    location /graphql {
        proxy_pass http://127.0.0.1:8080/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "https://rld.fi";
    }

    access_log off;
}
