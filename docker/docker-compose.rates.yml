# ═══════════════════════════════════════════════════════════════
# Envio/Analytics Stack
# ═══════════════════════════════════════════════════════════════
# Optional analytics-only stack.
#
#  Usage:
#    docker compose -f docker/docker-compose.rates.yml up -d
#
#  Envio GraphQL API:
#    http://localhost:5000/graphql
# ═══════════════════════════════════════════════════════════════

services:
  envio-graphql:
    profiles: ["analytics"]
    build:
      context: ..
      dockerfile: data-pipeline/Dockerfile.indexer
    ports:
      - "127.0.0.1:${ENVIO_PORT:-5000}:5000"
    environment:
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=8123
      - PYTHONUNBUFFERED=1
    command: ["uvicorn", "indexer.api.graphql:create_app", "--factory", "--host", "0.0.0.0", "--port", "5000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/healthz || exit 1"]

  fluid-indexer:
    profiles: ["analytics"]
    build:
      context: ..
      dockerfile: data-pipeline/Dockerfile.fluid
    environment:
      - ALCHEMY_RPC=${MAINNET_RPC_URL:-https://eth.llamarpc.com}
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=8123
      - POLL_INTERVAL=300
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  default:
    name: rld_shared
    external: true
