# ═══════════════════════════════════════════════════════════════
# Rates/Analytics Stack (Legacy Path)
# ═══════════════════════════════════════════════════════════════
# DEPRECATED FOR V2 LAUNCH.
# Use docker/docker-compose.infra.yml for launch-critical rates + bot.
# Keep this file for optional analytics experiments only.
#
#  Usage:
#    docker compose -f docker/docker-compose.rates.yml up -d
#
#  API:
#    http://localhost:8081/rates?limit=1&symbol=USDC
#
#  The simulation mm-daemon reads from this API to update the
#  MockRLDAaveOracle on the Anvil fork.
# ═══════════════════════════════════════════════════════════════

services:
  rates-indexer:
    profiles: ["analytics"]
    build:
      context: ..
      dockerfile: backend/Dockerfile.rates
    ports:
      - "127.0.0.1:${RATES_PORT:-8081}:8080"
    volumes:
      - rates-data:/app/data
      - ../backend/morpho/data:/app/morpho_data
    environment:
      - MAINNET_RPC_URL=${MAINNET_RPC_URL:-https://eth.llamarpc.com}
      - RESERVE_RPC_URL=${RESERVE_RPC_URL:-}
      - ETH_PRICE_GRAPH_URL=${ETH_PRICE_GRAPH_URL:-}
      - DB_DIR=/app/data
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]

  fluid-indexer:
    profiles: ["analytics"]
    build:
      context: ..
      dockerfile: data-pipeline/Dockerfile.fluid
    environment:
      - ALCHEMY_RPC=${MAINNET_RPC_URL:-https://eth.llamarpc.com}
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=8123
      - POLL_INTERVAL=300
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  rates-data:
    name: reth_rates-data
    external: true

networks:
  default:
    name: rld_shared
    external: true
