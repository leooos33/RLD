# RLD Frontend — Reverse Proxy
# Cloudflare → port 443 (HTTPS) → frontend container :3000
# Dashboard is served separately via :8090 and mounted at /dashboard/
server {
    listen 80;
    listen 443 ssl;
    server_name rld.fi *.rld.fi;

    ssl_certificate /etc/nginx/ssl/rld.crt;
    ssl_certificate_key /etc/nginx/ssl/rld.key;

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
