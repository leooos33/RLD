# ═══════════════════════════════════════════════════════════════
# Telegram Monitor Bot (compatibility compose)
# ═══════════════════════════════════════════════════════════════
# Preferred launch path: docker-compose.infra.yml (contains monitor-bot).
# Keep this file for bot-only operations and backward compatibility.
#
# Usage:
#   docker compose -f docker/docker-compose.bot.yml --env-file docker/.env up -d
#
# Health:
#   http://localhost:${BOT_PORT:-8083}/
# ═══════════════════════════════════════════════════════════════

services:
  monitor-bot:
    build:
      context: ..
      dockerfile: backend/Dockerfile.bot
    ports:
      - "127.0.0.1:8083:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - RATES_API_URL=http://rates-indexer:8080
      - MAINNET_RPC_URL=${BOT_RPC_URL:-https://eth.llamarpc.com}
      - API_KEY=${API_KEY:-}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./bot-data:/data
    restart: unless-stopped
    networks:
      - rld_shared
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

networks:
  rld_shared:
    name: rld_shared
    external: true
