# ═══════════════════════════════════════════════════════════════
# RLD Simulation Stack (Reth Mode)
# ═══════════════════════════════════════════════════════════════
# All services run in Docker, including Reth.
# Genesis contains all deployed contracts — no deployer needed.
#
#  Usage:
#    1. Generate genesis:  ./docker/reth/00_warmup.sh
#    2. Run:               ./docker/reth/restart-reth.sh
# ═══════════════════════════════════════════════════════════════

services:
  # ─── RETH NODE ──────────────────────────────────────────────
  reth:
    image: ghcr.io/paradigmxyz/reth:v1.11.3
    entrypoint: /usr/local/bin/reth
    command:
      - node
      - --dev
      - --dev.block-time
      - "${RETH_BLOCK_TIME:-1}s"
      - --chain
      - /genesis/genesis.json
      - --datadir
      - /data
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - "eth,net,web3,debug,trace,txpool"
      - --http.corsdomain
      - "*"
      - --gpo.maxprice
      - "1000000"
      - --log.stdout.filter
      - "info"
    volumes:
      - reth-datadir:/data
      - ./genesis.json:/genesis/genesis.json:ro
    ports:
      - "${RETH_PORT:-8545}:8545"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"echo > /dev/tcp/localhost/8545\"' || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 10

  # ─── POSTGRES ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres-data-reth:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=rld
      - POSTGRES_PASSWORD=${DB_PASSWORD:-rld_dev_password}
      - POSTGRES_DB=rld_indexer
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rld -d rld_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── INDEXER ─────────────────────────────────────────────────
  indexer:
    build:
      context: ../..
      dockerfile: docker/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      reth:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:-rld_dev_password}@postgres:5432/rld_indexer
      - RPC_URL=http://reth:8545
      - DEPLOYMENT_JSON=/config/deployment.json
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
    volumes:
      - ../deployment.json:/config/deployment.json:ro
    ports:
      - "${INDEXER_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── MM DAEMON ───────────────────────────────────────────────
  mm-daemon:
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "services/combined_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${MM_KEY}
      - MM_KEY=${MM_KEY}
      - ORACLE_ADMIN_KEY=${DEPLOYER_KEY}
      - API_URL=${API_URL:-http://rates-indexer:8080}
      - API_KEY=${API_KEY}
    restart: unless-stopped

  # ─── CHAOS TRADER ────────────────────────────────────────────
  chaos-trader:
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "tools/chaos_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${CHAOS_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
    restart: unless-stopped

  # ─── FAUCET SERVER ────────────────────────────────────────────
  faucet:
    build:
      context: .
      dockerfile: Dockerfile.faucet
    depends_on:
      reth:
        condition: service_healthy
    environment:
      - WHALE_KEY=${WHALE_KEY}
      - RPC_URL=http://localhost:8545
      - DEPLOYMENT_FILE=/config/deployment-snapshot.json
      - FAUCET_PORT=8088
    volumes:
      - ./deployment-snapshot.json:/config/deployment-snapshot.json:ro
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres-data-reth:
  reth-datadir:
