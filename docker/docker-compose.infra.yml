# ═══════════════════════════════════════════════════════════════
# RLD Infrastructure — Reth V2 Launch Baseline
# ═══════════════════════════════════════════════════════════════
# Always-on services independent from simulation restarts.
#
# Launch-critical:
#   - envio-graphql (data-pipeline)
#   - monitor-bot
#
# Optional analytics profile:
#   - morpho-indexer (enable with: --profile analytics)
#
# Usage:
#   docker compose -f docker/docker-compose.infra.yml --env-file docker/.env up -d
# ═══════════════════════════════════════════════════════════════

services:
  monitor-bot:
    build:
      context: ..
      dockerfile: backend/Dockerfile.bot
    ports:
      - "127.0.0.1:8083:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - RATES_API_URL=http://host.docker.internal:5000
      - MAINNET_RPC_URL=${BOT_RPC_URL:-https://eth.llamarpc.com}
      - API_KEY=${API_KEY:-}
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./bot-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  morpho-indexer:
    profiles: ["analytics"]
    build:
      context: ..
      dockerfile: backend/Dockerfile.morpho
    ports:
      - "127.0.0.1:${MORPHO_PORT:-18082}:8080"
    volumes:
      - morpho-data:/app/data
    environment:
      - MAINNET_RPC_URL=${MAINNET_RPC_URL:-https://eth.llamarpc.com}
      - DB_DIR=/app/data
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 60s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  bot-data:
  morpho-data:

networks:
  default:
    name: rld_shared
    external: true
