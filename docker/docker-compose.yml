# ═══════════════════════════════════════════════════════════════
# RLD Simulation Stack (Legacy Anvil Path)
# ═══════════════════════════════════════════════════════════════
# DEPRECATED FOR V2 LAUNCH:
#   This file is retained only for temporary Anvil-based genesis
#   generation during restart-reth bootstrap internals.
#   Canonical launch surface:
#     - docker/reth/docker-compose.reth.yml
#     - docker/docker-compose.infra.yml
#     - docker/docker-compose.frontend.yml
#
# Anvil runs EXTERNALLY. Set RPC_URL in .env pointing to it.
#
#  Usage:
#    1. Start Anvil:  anvil --fork-url $ETH_RPC_URL --fork-block-number 21698573 --block-time 12
#    2. Copy .env.example → .env and fill in RPC_URL
#    3. docker compose up --build
#
#  Startup order:
#    postgres → indexer → deployer → mm-daemon / chaos
# ═══════════════════════════════════════════════════════════════

services:
  # ─── POSTGRES (shared, persistent) ──────────────────────────
  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=rld
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=rld_indexer
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rld -d rld_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── INDEXER (starts first, stays running) ───────────────────
  indexer:
    build:
      context: ..
      dockerfile: docker/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/rld_indexer
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - DEPLOYMENT_JSON=/config/deployment.json
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - INDEXER_ADMIN_TOKEN=${INDEXER_ADMIN_TOKEN:?INDEXER_ADMIN_TOKEN must be set}
      - INDEXER_ALLOW_UNSAFE_ADMIN_RESET=${INDEXER_ALLOW_UNSAFE_ADMIN_RESET:-false}
      - INDEXER_ADMIN_INTERNAL_ONLY=${INDEXER_ADMIN_INTERNAL_ONLY:-true}
      - INDEXER_EXPOSE_INTERNAL_ERRORS=${INDEXER_EXPOSE_INTERNAL_ERRORS:-false}
      - INDEXER_CORS_ORIGINS=${INDEXER_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,https://rld.fi,https://www.rld.fi}
    volumes:
      - ./deployment.json:/config/deployment.json:ro
    ports:
      - "127.0.0.1:${INDEXER_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2)\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── DEPLOYER (one-shot) — waits for indexer to be healthy ──
  deployer:
    build:
      context: ..
      dockerfile: docker/deployer/Dockerfile
    depends_on:
      indexer:
        condition: service_healthy
    volumes:
      - ./deployment.json:/config/deployment.json
      - ../contracts/src:/workspace/contracts/src
    environment:
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - FORK_BLOCK=${FORK_BLOCK:-24660000}
      - ETH_RPC_URL=${ETH_RPC_URL}
      - DEPLOYER_KEY=${DEPLOYER_KEY}
      - USER_A_KEY=${USER_A_KEY}
      - USER_B_KEY=${USER_B_KEY}
      - USER_C_KEY=${USER_C_KEY}
      - MM_KEY=${MM_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
      - RATES_API_BASE_URL=${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - API_URL=${API_URL:-${RATES_API_BASE_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - ENVIO_API_URL=${ENVIO_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - RATES_API_URL=${RATES_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - API_KEY=${API_KEY}
      - MIN_BORROW_APY=${MIN_BORROW_APY:-0.0}
      - MAX_BORROW_APY=${MAX_BORROW_APY:-2.0}
      - MAX_RATE_AGE_SECONDS=${MAX_RATE_AGE_SECONDS:-900}
      - REQUIRE_RATE_TIMESTAMP=${REQUIRE_RATE_TIMESTAMP:-true}
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/rld_indexer
      - SKIP_USER_SETUP=${SKIP_USER_SETUP:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── MM DAEMON (long-running) ────────────────────────────────
  mm-daemon:
    build:
      context: ..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "services/combined_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${MM_KEY}
      - MM_KEY=${MM_KEY}
      - ORACLE_ADMIN_KEY=${DEPLOYER_KEY}
      - RATES_API_BASE_URL=${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - API_URL=${API_URL:-${RATES_API_BASE_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - ENVIO_API_URL=${ENVIO_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - RATES_API_URL=${RATES_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - API_KEY=${API_KEY}
      - MIN_BORROW_APY=${MIN_BORROW_APY:-0.0}
      - MAX_BORROW_APY=${MAX_BORROW_APY:-2.0}
      - MAX_RATE_AGE_SECONDS=${MAX_RATE_AGE_SECONDS:-900}
      - RATES_TIMEOUT=${RATES_TIMEOUT:-2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f combined_daemon >/dev/null && python3 -c \"import urllib.request; urllib.request.urlopen('http://host.docker.internal:${RATES_API_PORT:-5000}/readyz', timeout=2)\""
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ─── CHAOS TRADER (long-running) ─────────────────────────────
  chaos-trader:
    build:
      context: ..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "tools/chaos_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${CHAOS_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f chaos_daemon || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  postgres-data: # Persistent PostgreSQL data

networks:
  default:
    name: rld_shared
    external: true
