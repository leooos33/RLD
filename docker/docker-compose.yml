# ═══════════════════════════════════════════════════════════════
# RLD Simulation Stack (Legacy Anvil Path)
# ═══════════════════════════════════════════════════════════════
# DEPRECATED FOR V2 LAUNCH:
#   This file is retained only for temporary Anvil-based genesis
#   generation during restart-reth bootstrap internals.
#   Canonical launch surface:
#     - docker/reth/docker-compose.reth.yml
#     - docker/docker-compose.infra.yml
#     - docker/docker-compose.frontend.yml
#
# Anvil runs EXTERNALLY. Set RPC_URL in .env pointing to it.
#
#  Usage:
#    1. Start Anvil:  anvil --fork-url $ETH_RPC_URL --fork-block-number 21698573 --block-time 12
#    2. Copy .env.example → .env and fill in RPC_URL
#    3. docker compose up --build
#
#  Startup order:
#    postgres → indexer → deployer → mm-daemon / chaos
# ═══════════════════════════════════════════════════════════════

services:
  # ─── POSTGRES (shared, persistent) ──────────────────────────
  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=rld
      - POSTGRES_PASSWORD=${DB_PASSWORD:-rld_dev_password}
      - POSTGRES_DB=rld_indexer
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rld -d rld_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── INDEXER (starts first, stays running) ───────────────────
  indexer:
    build:
      context: ..
      dockerfile: docker/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:-rld_dev_password}@postgres:5432/rld_indexer
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - DEPLOYMENT_JSON=/config/deployment.json
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - INDEXER_ADMIN_TOKEN=${INDEXER_ADMIN_TOKEN:-}
    volumes:
      - ./deployment.json:/config/deployment.json:ro
    ports:
      - "127.0.0.1:${INDEXER_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"echo > /dev/tcp/localhost/8080\"' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── DEPLOYER (one-shot) — waits for indexer to be healthy ──
  deployer:
    build:
      context: ..
      dockerfile: docker/deployer/Dockerfile
    depends_on:
      indexer:
        condition: service_healthy
    volumes:
      - ./deployment.json:/config/deployment.json
      - ../contracts/src:/workspace/contracts/src
    environment:
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - FORK_BLOCK=${FORK_BLOCK:-24660000}
      - ETH_RPC_URL=${ETH_RPC_URL}
      - DEPLOYER_KEY=${DEPLOYER_KEY}
      - USER_A_KEY=${USER_A_KEY}
      - USER_B_KEY=${USER_B_KEY}
      - USER_C_KEY=${USER_C_KEY}
      - MM_KEY=${MM_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
      - API_URL=${API_URL:-http://host.docker.internal:5000}
      - API_KEY=${API_KEY}
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:-rld_dev_password}@postgres:5432/rld_indexer
      - SKIP_USER_SETUP=${SKIP_USER_SETUP:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── MM DAEMON (long-running) ────────────────────────────────
  mm-daemon:
    build:
      context: ..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "services/combined_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${MM_KEY}
      - MM_KEY=${MM_KEY}
      - ORACLE_ADMIN_KEY=${DEPLOYER_KEY}
      - API_URL=${API_URL:-http://host.docker.internal:5000}
      - API_KEY=${API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f combined_daemon || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ─── CHAOS TRADER (long-running) ─────────────────────────────
  chaos-trader:
    build:
      context: ..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "tools/chaos_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${CHAOS_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f chaos_daemon || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  postgres-data: # Persistent PostgreSQL data

networks:
  default:
    name: rld_shared
    external: true
