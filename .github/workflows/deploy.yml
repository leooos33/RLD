name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker/**"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & test frontend
  # ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://rld.fi/api
          VITE_MAINNET_RPC_URL: ${{ secrets.VITE_MAINNET_RPC_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────
  # 2. Deploy to server
  # ──────────────────────────────────────────────
  deploy:
    needs: frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSPHRASE: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail

          missing=()
          if [ -z "${DEPLOY_HOST:-}" ]; then missing+=("DEPLOY_HOST"); fi
          if [ -z "${DEPLOY_USER:-}" ]; then missing+=("DEPLOY_USER"); fi
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then missing+=("DEPLOY_SSH_KEY"); fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required deploy secrets: ${missing[*]}"
            exit 1
          fi

          host="$(printf '%s' "${DEPLOY_HOST}" | tr -d '\r\n' | xargs)"
          user="$(printf '%s' "${DEPLOY_USER}" | tr -d '\r\n' | xargs)"
          if [ -z "$host" ] || [ -z "$user" ]; then
            echo "::error::DEPLOY_HOST/DEPLOY_USER resolve to empty after trimming"
            exit 1
          fi
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=$user" >> "$GITHUB_ENV"

          if [ -n "${DEPLOY_PORT:-}" ]; then
            port="$(printf '%s' "${DEPLOY_PORT}" | tr -d '\r\n' | xargs)"
          else
            port="22"
          fi
          if ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_PORT must be numeric (got: '$port')"
            exit 1
          fi
          echo "DEPLOY_PORT=$port" >> "$GITHUB_ENV"

      - name: Prepare SSH key file
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSPHRASE: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          key_file="$RUNNER_TEMP/deploy_ssh_key"
          # Normalize multiline key secret (especially CRLF) before auth actions consume it.
          printf '%s\n' "$DEPLOY_SSH_KEY" | sed 's/\r$//' > "$key_file"
          chmod 600 "$key_file"
          echo "DEPLOY_SSH_KEY_PATH=$key_file" >> "$GITHUB_ENV"

          if [ -n "${DEPLOY_SSH_PASSPHRASE:-}" ]; then
            ssh-keygen -y -P "$DEPLOY_SSH_PASSPHRASE" -f "$key_file" >/dev/null
          else
            ssh-keygen -y -f "$key_file" >/dev/null
          fi

      - name: Deploy frontend to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          port: ${{ env.DEPLOY_PORT }}
          key_path: ${{ env.DEPLOY_SSH_KEY_PATH }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          timeout: 90s
          command_timeout: 10m
          debug: true
          source: "dist/*"
          target: "/home/ubuntu/RLD/frontend/"
          strip_components: 0

      - name: Restart services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          port: ${{ env.DEPLOY_PORT }}
          key_path: ${{ env.DEPLOY_SSH_KEY_PATH }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          timeout: 90s
          command_timeout: 20m
          debug: true
          script: |
            cd /home/ubuntu/RLD

            # Sync ALL config files first (docker-compose, nginx.conf, etc.)
            git fetch origin main
            git reset --hard origin/main

            # Force fonts.css and font files from git into dist/ (SCP unreliable for root files)
            mkdir -p /home/ubuntu/RLD/frontend/dist/fonts
            cp /home/ubuntu/RLD/frontend/public/fonts.css /home/ubuntu/RLD/frontend/dist/fonts.css
            cp /home/ubuntu/RLD/frontend/public/fonts/*.woff2 /home/ubuntu/RLD/frontend/dist/fonts/
            echo "✅ fonts.css: $(wc -c < /home/ubuntu/RLD/frontend/dist/fonts.css) bytes, has JBM: $(grep -c 'JetBrains Mono' /home/ubuntu/RLD/frontend/dist/fonts.css || echo 0)"

            # Force-recreate the frontend container with the new dist/
            # docker-compose.frontend.yml now uses volume mounts — no image rebuild
            echo "🔄 Restarting frontend container..."
            docker compose -f docker/docker-compose.frontend.yml up -d --no-deps --force-recreate frontend
            echo "✅ Frontend live"

            # Rebuild canonical backend services if backend changed
            if git diff HEAD~1 --name-only | grep -q "^backend/"; then
              echo "🔄 Backend changed — rebuilding simulation indexer + monitor-bot..."
              docker compose -f docker/reth/docker-compose.reth.yml --env-file docker/.env build indexer
              docker compose -f docker/reth/docker-compose.reth.yml --env-file docker/.env up -d --no-deps indexer
              docker compose -f docker/docker-compose.infra.yml --env-file docker/.env build monitor-bot
              docker compose -f docker/docker-compose.infra.yml --env-file docker/.env up -d --no-deps --force-recreate monitor-bot
            fi

            echo "✅ Deploy complete"
