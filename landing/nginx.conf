server {
    listen 80;
    listen [::]:80;
    server_name demo.rld.fi;

    root /home/ubuntu/RLD/landing/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block sensitive files
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # Proxy indexer API (avoids CORS from demo.rld.fi)
    location /graphql {
        proxy_pass https://rld.fi/graphql;
        proxy_ssl_server_name on;
        proxy_set_header Host rld.fi;
        proxy_set_header Content-Type application/json;
    }

    location /api/ {
        proxy_pass https://rld.fi/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host rld.fi;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;
}
