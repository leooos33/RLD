<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RLD // SIMULATION</title>
    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #06080a;
        --s1: #0c0e12;
        --s2: #12151a;
        --s3: #181c22;
        --bdr: #1c2028;
        --bdr2: #252a33;
        --g: #00ff88;
        --gd: #00cc6a;
        --g10: rgba(0, 255, 136, 0.06);
        --g20: rgba(0, 255, 136, 0.12);
        --a: #ffb020;
        --ad: #cc8800;
        --a10: rgba(255, 176, 32, 0.06);
        --a20: rgba(255, 176, 32, 0.12);
        --r: #ff4455;
        --rd: #cc2233;
        --r10: rgba(255, 68, 85, 0.06);
        --r20: rgba(255, 68, 85, 0.12);
        --c: #38bdf8;
        --cd: #0ea5e9;
        --c10: rgba(56, 189, 248, 0.06);
        --p: #a78bfa;
        --pd: #8b5cf6;
        --p10: rgba(167, 139, 250, 0.06);
        --p20: rgba(167, 139, 250, 0.12);
        --t: #8892a0;
        --td: #4a5260;
        --tb: #d0d5dd;
        --tw: #f0f2f5;
      }
      html {
        font-size: 13px;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--t);
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 136, 0.004) 2px,
          rgba(0, 255, 136, 0.004) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }
      ::selection {
        background: var(--g20);
        color: var(--g);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .wrap {
        max-width: 1440px;
        margin: 0 auto;
        padding: 12px 16px;
      }

      /* ── Header ── */
      .hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0 14px;
        border-bottom: 1px solid var(--bdr);
        margin-bottom: 12px;
      }
      .hdr-l {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .hdr-r {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo {
        font-size: 16px;
        font-weight: 700;
        color: var(--g);
        text-shadow: 0 0 12px rgba(0, 255, 136, 0.25);
      }
      .subtitle {
        font-size: 10px;
        color: var(--td);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--bdr);
      }
      .tab {
        padding: 8px 20px;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--td);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        text-decoration: none;
      }
      .tab:hover {
        color: var(--tb);
        background: rgba(255, 255, 255, 0.02);
      }
      .tab.active {
        color: var(--g);
        border-bottom-color: var(--g);
        background: var(--g10);
      }

      /* ── Grid ── */
      .grid {
        display: grid;
        gap: 1px;
      }
      .g2 {
        grid-template-columns: 1fr 1fr;
      }
      .g3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .g4 {
        grid-template-columns: repeat(4, 1fr);
      }
      .g5 {
        grid-template-columns: repeat(5, 1fr);
      }
      .g32 {
        grid-template-columns: 3fr 2fr;
      }
      .g23 {
        grid-template-columns: 2fr 3fr;
      }
      @media (max-width: 600px) {
        .g2,
        .g3,
        .g4,
        .g5,
        .g32,
        .g23 {
          grid-template-columns: 1fr;
        }
      }

      /* ── Card ── */
      .card {
        background: var(--s1);
        border: 1px solid var(--bdr);
        padding: 12px 14px;
        animation: fadeUp 0.35s ease both;
      }
      .card-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--td);
      }
      .card-hdr .label {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* ── Badge ── */
      .badge {
        font-size: 8px;
        padding: 2px 7px;
        border-radius: 2px;
        letter-spacing: 1.2px;
        font-weight: 600;
        white-space: nowrap;
      }
      .b-g {
        background: var(--g10);
        color: var(--g);
        border: 1px solid var(--g20);
      }
      .b-a {
        background: var(--a10);
        color: var(--a);
        border: 1px solid var(--a20);
      }
      .b-r {
        background: var(--r10);
        color: var(--r);
        border: 1px solid var(--r20);
      }
      .b-c {
        background: var(--c10);
        color: var(--c);
        border: 1px solid rgba(56, 189, 248, 0.15);
      }
      .b-p {
        background: var(--p10);
        color: var(--p);
        border: 1px solid rgba(167, 139, 250, 0.15);
      }

      /* ── Dot ── */
      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .dg {
        background: var(--g);
        box-shadow: 0 0 5px var(--g);
      }
      .da {
        background: var(--a);
        box-shadow: 0 0 5px var(--a);
      }
      .dr {
        background: var(--r);
        box-shadow: 0 0 5px var(--r);
      }

      /* ── Table ── */
      .tbl {
        width: 100%;
        border-collapse: collapse;
      }
      .tbl th {
        text-align: left;
        color: var(--td);
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 4px 6px;
        border-bottom: 1px solid var(--bdr);
        font-weight: 400;
      }
      .tbl td {
        padding: 4px 6px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        font-size: 11px;
        white-space: nowrap;
      }
      .tbl tr:hover td {
        background: rgba(0, 255, 136, 0.01);
      }
      .tbl .r {
        text-align: right;
      }

      /* ── Metric ── */
      .mv {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }
      .mv-sm {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.3px;
        line-height: 1.2;
      }
      .ml {
        font-size: 8px;
        color: var(--td);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-top: 2px;
      }
      .ms {
        font-size: 10px;
        color: var(--td);
        margin-left: 2px;
        font-weight: 300;
      }

      /* ── Chart ── */
      .chart-wrap {
        position: relative;
        height: 360px;
        border: 1px solid var(--bdr);
        background: var(--s2);
        border-radius: 2px;
        overflow: hidden;
      }
      .chart-svg {
        width: 100%;
        height: 100%;
      }

      /* ── Event item ── */
      .evt {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        font-size: 10px;
        animation: fadeUp 0.2s ease both;
      }
      .evt-type {
        font-size: 8px;
        padding: 2px 0;
        border-radius: 1px;
        letter-spacing: 1px;
        font-weight: 600;
        width: 72px;
        text-align: center;
        flex-shrink: 0;
        display: inline-block;
      }
      .evt-swap {
        background: var(--c10);
        color: var(--c);
        border: 1px solid rgba(56, 189, 248, 0.15);
      }
      .evt-transfer {
        background: var(--p10);
        color: var(--p);
        border: 1px solid rgba(167, 139, 250, 0.15);
      }
      .evt-other {
        background: rgba(255, 255, 255, 0.03);
        color: var(--td);
        border: 1px solid var(--bdr);
      }

      /* ── Stat row ── */
      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
        font-size: 10px;
      }
      .stat-k {
        color: var(--td);
      }
      .stat-v {
        color: var(--tb);
        font-weight: 500;
      }

      .glow-g {
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
      }
      .glow-c {
        text-shadow: 0 0 8px rgba(56, 189, 248, 0.25);
      }
      .glow-p {
        text-shadow: 0 0 8px rgba(167, 139, 250, 0.25);
      }

      .ftr {
        text-align: center;
        padding: 10px 0;
        color: var(--td);
        font-size: 8px;
        border-top: 1px solid var(--bdr);
        margin-top: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 16px;
        align-items: center;
        font-size: 9px;
        color: var(--td);
      }
      .legend-dot {
        width: 8px;
        height: 3px;
        border-radius: 1px;
        display: inline-block;
        margin-right: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback, useMemo } = React;

      // ══════════════════ UTILS ══════════════════
      const fmt = (v, d = 2) => {
        if (v === undefined || v === null || v === "") return "—";
        const n = Number(v);
        if (isNaN(n)) return v;
        if (Math.abs(n) >= 1e9) return "$" + (n / 1e9).toFixed(d) + "B";
        if (Math.abs(n) >= 1e6) return "$" + (n / 1e6).toFixed(d) + "M";
        if (Math.abs(n) >= 1e3)
          return (
            "$" +
            n.toLocaleString(undefined, {
              minimumFractionDigits: d,
              maximumFractionDigits: d,
            })
          );
        return "$" + n.toFixed(d);
      };
      const fmtN = (n, d = 2) => {
        if (n === undefined || n === null || n === "") return "—";
        const v = Number(n);
        if (isNaN(v)) return n;
        if (v >= 1e9) return (v / 1e9).toFixed(d) + "B";
        if (v >= 1e6) return (v / 1e6).toFixed(d) + "M";
        if (v >= 1e3) return v.toLocaleString();
        return v.toFixed(d);
      };
      const fmtPct = (v, d = 2) => {
        if (v === undefined || v === null) return "—";
        return (v >= 0 ? "+" : "") + Number(v).toFixed(d) + "%";
      };
      const fmtAddr = (a) => (a ? `${a.slice(0, 6)}…${a.slice(-4)}` : "—");
      const fmtTs = (ts) => {
        if (!ts) return "—";
        const d = new Date(ts * 1000);
        return d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      };
      const fmtAgo = (ts) => {
        if (!ts) return "—";
        const now = Date.now() / 1000;
        const d = Math.floor(now - ts);
        if (d < 60) return `${d}s ago`;
        if (d < 3600) return `${Math.floor(d / 60)}m ago`;
        if (d < 86400) return `${Math.floor(d / 3600)}h ago`;
        return `${Math.floor(d / 86400)}d ago`;
      };
      const fromRaw = (v, decimals = 6) => {
        if (!v && v !== 0) return 0;
        return Number(v) / Math.pow(10, decimals);
      };

      // ── Descriptive stats ──
      function calcStats(arr) {
        if (!arr || arr.length === 0) return null;
        const n = arr.length;
        const sorted = [...arr].sort((a, b) => a - b);
        const sum = arr.reduce((a, b) => a + b, 0);
        const mean = sum / n;
        const variance = arr.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n;
        const std = Math.sqrt(variance);
        const min = sorted[0];
        const max = sorted[n - 1];
        const median =
          n % 2 === 0
            ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2
            : sorted[Math.floor(n / 2)];
        const q1 = sorted[Math.floor(n * 0.25)];
        const q3 = sorted[Math.floor(n * 0.75)];
        const latest = arr[arr.length - 1];
        const first = arr[0];
        const change = first !== 0 ? ((latest - first) / first) * 100 : 0;
        return {
          n,
          mean,
          std,
          min,
          max,
          median,
          q1,
          q3,
          latest,
          first,
          change,
        };
      }

      // ══════════════════ COMPONENTS ══════════════════
      const Badge = ({ text, type }) => (
        <span className={`badge b-${type}`}>{text}</span>
      );
      const Dot = ({ ok }) => <span className={`dot ${ok ? "dg" : "dr"}`} />;
      const Card = ({ title, badge, children, style, delay = 0 }) => (
        <div
          className="card"
          style={{ ...style, animationDelay: `${delay * 40}ms` }}
        >
          <div className="card-hdr">
            <span className="label">{title}</span>
            {badge}
          </div>
          {children}
        </div>
      );

      // ── Dual-series SVG price chart ──
      const PriceChart = ({ data }) => {
        if (!data || data.length < 2)
          return (
            <div
              style={{
                height: 360,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                color: "var(--td)",
                fontSize: 11,
              }}
            >
              <span style={{ animation: "pulse 1.5s ease infinite" }}>
                Loading price history from indexer...
              </span>
            </div>
          );

        const marks = data
          .map((d) => d.mark_price)
          .filter((v) => v != null && v > 0);
        const idxs = data
          .map((d) => d.index_price)
          .filter((v) => v != null && v > 0);
        const allPrices = [...marks, ...idxs];
        const mn = Math.min(...allPrices);
        const mx = Math.max(...allPrices);
        const range = mx - mn || 0.01;

        const w = 1200,
          h = 360,
          padL = 60,
          padR = 20,
          padT = 40,
          padB = 30;
        const cw = w - padL - padR,
          ch = h - padT - padB;

        const toX = (i) => padL + (i / (data.length - 1)) * cw;
        const toY = (v) => padT + ch - ((v - mn) / range) * ch;

        // Build path strings
        let markPath = "";
        let idxPath = "";
        let markArea = "";
        data.forEach((d, i) => {
          const x = toX(i);
          if (d.mark_price > 0) {
            const y = toY(d.mark_price);
            markPath += (markPath ? "L" : "M") + `${x},${y} `;
          }
          if (d.index_price > 0) {
            const y = toY(d.index_price);
            idxPath += (idxPath ? "L" : "M") + `${x},${y} `;
          }
        });

        // Y-axis labels
        const ySteps = 5;
        const yLabels = [];
        for (let i = 0; i <= ySteps; i++) {
          const v = mn + (range / ySteps) * i;
          yLabels.push({ y: toY(v), label: "$" + v.toFixed(4) });
        }

        // X-axis labels (show ~5 timestamps)
        const xLabels = [];
        const step = Math.max(1, Math.floor(data.length / 5));
        for (let i = 0; i < data.length; i += step) {
          const d = data[i];
          if (d.timestamp) {
            const dt = new Date(d.timestamp * 1000);
            xLabels.push({
              x: toX(i),
              label: dt.toLocaleTimeString("en-GB", {
                hour: "2-digit",
                minute: "2-digit",
              }),
            });
          }
        }

        const latestMark = marks[marks.length - 1];
        const latestIdx = idxs[idxs.length - 1];

        return (
          <div className="chart-wrap">
            <svg
              className="chart-svg"
              viewBox={`0 0 ${w} ${h}`}
              preserveAspectRatio="none"
            >
              <defs>
                <linearGradient id="mark-grad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--c)" stopOpacity="0.08" />
                  <stop offset="100%" stopColor="var(--c)" stopOpacity="0" />
                </linearGradient>
                <linearGradient id="idx-grad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--p)" stopOpacity="0.08" />
                  <stop offset="100%" stopColor="var(--p)" stopOpacity="0" />
                </linearGradient>
              </defs>
              {/* Grid lines */}
              {yLabels.map((yl, i) => (
                <g key={i}>
                  <line
                    x1={padL}
                    y1={yl.y}
                    x2={w - padR}
                    y2={yl.y}
                    stroke="var(--bdr)"
                    strokeWidth="0.5"
                  />
                  <text
                    x={padL - 6}
                    y={yl.y + 3}
                    textAnchor="end"
                    fill="var(--td)"
                    fontSize="8"
                    fontFamily="JetBrains Mono"
                  >
                    {yl.label}
                  </text>
                </g>
              ))}
              {xLabels.map((xl, i) => (
                <text
                  key={i}
                  x={xl.x}
                  y={h - 8}
                  textAnchor="middle"
                  fill="var(--td)"
                  fontSize="8"
                  fontFamily="JetBrains Mono"
                >
                  {xl.label}
                </text>
              ))}
              {/* Index price (purple, behind) */}
              <path
                d={idxPath}
                fill="none"
                stroke="var(--p)"
                strokeWidth="1.5"
                strokeOpacity="0.7"
                vectorEffect="non-scaling-stroke"
              />
              {/* Mark price (cyan, front) */}
              <path
                d={markPath}
                fill="none"
                stroke="var(--c)"
                strokeWidth="2"
                vectorEffect="non-scaling-stroke"
              />
              {/* Latest dots */}
              {latestMark > 0 && (
                <circle
                  cx={toX(data.length - 1)}
                  cy={toY(latestMark)}
                  r="4"
                  fill="var(--c)"
                  stroke="var(--bg)"
                  strokeWidth="1"
                />
              )}
              {latestIdx > 0 && (
                <circle
                  cx={toX(data.length - 1)}
                  cy={toY(latestIdx)}
                  r="3"
                  fill="var(--p)"
                  stroke="var(--bg)"
                  strokeWidth="1"
                />
              )}
            </svg>
            {/* Overlay labels */}
            <div style={{ position: "absolute", top: 8, left: padL + 8 }}>
              <div className="legend">
                <span>
                  <span
                    className="legend-dot"
                    style={{ background: "var(--c)" }}
                  />
                  MARK PRICE
                </span>
                <span>
                  <span
                    className="legend-dot"
                    style={{ background: "var(--p)" }}
                  />
                  INDEX PRICE
                </span>
              </div>
            </div>
            <div
              style={{
                position: "absolute",
                top: 6,
                right: 12,
                textAlign: "right",
              }}
            >
              <div style={{ fontSize: 9, color: "var(--td)" }}>
                MARK{" "}
                <span
                  style={{ color: "var(--c)", fontWeight: 600, fontSize: 14 }}
                >
                  ${latestMark?.toFixed(4)}
                </span>
              </div>
              <div style={{ fontSize: 9, color: "var(--td)", marginTop: 2 }}>
                INDEX{" "}
                <span
                  style={{ color: "var(--p)", fontWeight: 600, fontSize: 14 }}
                >
                  ${latestIdx?.toFixed(4)}
                </span>
              </div>
            </div>
            <div
              style={{
                position: "absolute",
                bottom: padB + 6,
                left: padL + 8,
                fontSize: 9,
                color: "var(--td)",
              }}
            >
              {data.length} data points · blocks{" "}
              {data[0].block_number?.toLocaleString()} →{" "}
              {data[data.length - 1].block_number?.toLocaleString()}
            </div>
          </div>
        );
      };

      // ══════════════════ MAIN APP ══════════════════
      function App() {
        const [latest, setLatest] = useState(null);
        const [chartData, setChartData] = useState(null);
        const [events, setEvents] = useState([]);
        const [err, setErr] = useState(null);
        const [tick, setTick] = useState(0);
        const [now, setNow] = useState(new Date());

        const loadLatest = useCallback(() => {
          fetch("/api/latest")
            .then((r) => r.json())
            .then((d) => {
              setLatest(d);
              setErr(null);
            })
            .catch((e) => setErr(e.message));
        }, []);

        const loadChart = useCallback(() => {
          fetch("/api/chart/price?limit=1000")
            .then((r) => r.json())
            .then((d) => {
              if (d && d.data) setChartData(d.data);
            })
            .catch(() => {});
        }, []);

        const loadEvents = useCallback(() => {
          fetch("/api/events?limit=1000")
            .then((r) => r.json())
            .then((d) => {
              if (Array.isArray(d)) setEvents(d);

                </div>
                <div className="stat-row">
                  <span className="stat-k">Active Borrowers</span>
                  <span className="stat-v">
                    {
                      bps.filter(
                        (b) =>
                          fromRaw(b.debt, 6) > 0 ||
                          fromRaw(b.debt_value, 6) > 0,
                      ).length
                    }
                  </span>
                </div>
                <div className="stat-row">
                  <span className="stat-k">Last Update</span>
                  <span className="stat-v">
                    {fmtAgo(ms.last_update_timestamp)}
                  </span>
                </div>
              </Card>
            </div>

            {/* ═══ FOOTER ═══ */}
            <div className="ftr">
              RLD Protocol · Simulation Monitor v2.0 · auto-refresh 10s · next
              update in{" "}
              <span style={{ color: "var(--c)" }}>{10 - (tick % 10)}s</span>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
